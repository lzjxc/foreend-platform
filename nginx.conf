server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Allow large file uploads (tech doc ZIP, PDF books, etc.)
    client_max_body_size 100m;

    # K8s CoreDNS resolver for dynamic upstream resolution
    resolver 10.63.0.10 valid=10s;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Prevent caching of index.html to ensure users always get latest version
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Static file caching (only for local assets, not proxy paths)
    # These files have content hashes in filenames, so 1-year cache is safe
    location ~* ^/assets/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ==================== API Proxies (K8s Internal) ====================

    # Personal Info API
    location /personal-api/ {
        set $personal_upstream http://personal-info-service.personal.svc.cluster.local:8000;
        rewrite ^/personal-api/(.*)$ /$1 break;
        proxy_pass $personal_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Service-ID "foreend-platform";
        proxy_set_header X-Service-Token "$PERSONAL_INFO_SERVICE_TOKEN";
    }

    # LLM Gateway (LiteLLM - direct)
    location /llm-gateway/ {
        set $llm_gw_upstream http://litellm.litellm.svc.cluster.local:4000;
        rewrite ^/llm-gateway/(.*)$ /$1 break;
        proxy_pass $llm_gw_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization "Bearer $LLM_GATEWAY_API_KEY";
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }

    # LLM Gateway API (our wrapper service with usage breakdown)
    location /llm-gateway-api/ {
        set $llm_api_upstream http://llm-gateway.litellm.svc.cluster.local:8000;
        rewrite ^/llm-gateway-api/(.*)$ /$1 break;
        proxy_pass $llm_api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # File Gateway (MinIO) - large file uploads for knowledge capture etc.
    location /file-api/ {
        set $file_upstream http://file-gateway.shared-services.svc.cluster.local:8000;
        rewrite ^/file-api/(.*)$ /$1 break;
        proxy_pass $file_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        client_max_body_size 100M;
    }

    # Homework API
    location /homework-api/ {
        set $homework_upstream http://homework-api.homework.svc.cluster.local:8000;
        rewrite ^/homework-api/(.*)$ /$1 break;
        proxy_pass $homework_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;  # Vision AI grading can take time
        client_max_body_size 50M;  # Allow image uploads up to 50MB
    }

    # Wordbook API
    location /wordbook-api/ {
        set $wordbook_upstream http://wordbook-core-api.wordbook.svc.cluster.local:8000;
        rewrite ^/wordbook-api/(.*)$ /$1 break;
        proxy_pass $wordbook_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # AI Weekly API
    location /ai-weekly-api/ {
        set $aiweekly_upstream http://ai-weekly-api.apps.svc.cluster.local:8000;
        rewrite ^/ai-weekly-api/(.*)$ /$1 break;
        proxy_pass $aiweekly_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # Notification Service
    location /notification-api/ {
        set $notification_upstream http://msg-gw.shared-services.svc.cluster.local:8000;
        rewrite ^/notification-api/(.*)$ /$1 break;
        proxy_pass $notification_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # PDF Service
    location /pdf-api/ {
        set $pdf_upstream http://pdf-service.shared-services.svc.cluster.local:8000;
        rewrite ^/pdf-api/(.*)$ /$1 break;
        proxy_pass $pdf_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }

    # Data Fetcher - Collect API (longer timeout for external fetching)
    location /data-fetcher-api/api/v1/collect/ {
        set $datafetcher_upstream http://data-fetcher.shared-services.svc.cluster.local:8000;
        rewrite ^/data-fetcher-api/(.*)$ /$1 break;
        proxy_pass $datafetcher_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 180s;  # 3 minutes for external data collection
    }

    # Data Fetcher - General API
    location /data-fetcher-api/ {
        set $datafetcher_upstream http://data-fetcher.shared-services.svc.cluster.local:8000;
        rewrite ^/data-fetcher-api/(.*)$ /$1 break;
        proxy_pass $datafetcher_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # Config Service
    location /config-api/ {
        set $config_upstream http://config-service.shared-services.svc.cluster.local:8000;
        rewrite ^/config-api/(.*)$ /$1 break;
        proxy_pass $config_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # Finance Service
    location /finance-api/ {
        set $finance_upstream http://finance-service.shared-services.svc.cluster.local:8000;
        rewrite ^/finance-api/(.*)$ /$1 break;
        proxy_pass $finance_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # Efficiency Evaluator
    location /efficiency-api/ {
        set $efficiency_upstream http://efficiency-evaluator.shared-services.svc.cluster.local:8000;
        rewrite ^/efficiency-api/(.*)$ /$1 break;
        proxy_pass $efficiency_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;  # Evaluation can take longer
    }

    # LM Studio (Local LLM)
    location /lm-studio/ {
        set $lmstudio_upstream http://192.168.1.218:1234;
        rewrite ^/lm-studio/(.*)$ /$1 break;
        proxy_pass $lmstudio_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;  # LLM responses can be slow
    }

    # Doc Service API
    location /doc-api/ {
        set $doc_upstream http://doc-service.shared-services.svc.cluster.local:8000;
        rewrite ^/doc-api/(.*)$ /$1 break;
        proxy_pass $doc_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # MinIO S3 (for PDF downloads etc)
    location /minio-s3/ {
        set $minio_upstream https://minio.minio.svc.cluster.local:443;
        rewrite ^/minio-s3/(.*)$ /$1 break;
        proxy_pass $minio_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host minio.minio.svc.cluster.local;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_ssl_verify off;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }

    # Remote Wake Service
    location /remote-wake-api/ {
        set $remotewake_upstream http://remote-wake-service.shared-services.svc.cluster.local:8080;
        rewrite ^/remote-wake-api/(.*)$ /$1 break;
        proxy_pass $remotewake_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # MacBook Camera Service (direct LAN access - Mac at 192.168.1.136)
    # Using LAN IP instead of K8s Endpoint+Tailscale for reliable Pod connectivity
    location /mac-camera-api/ {
        set $camera_upstream http://192.168.1.136:8090;
        rewrite ^/mac-camera-api/(.*)$ /$1 break;
        proxy_pass $camera_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # Argo Workflows API (for batch task progress)
    location /argo-api/ {
        set $argo_upstream http://argo-workflows-server.argo.svc.cluster.local:2746;
        rewrite ^/argo-api/(.*)$ /$1 break;
        proxy_pass $argo_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # Design Skills API (game development)
    location /design-skills-api/ {
        set $designskills_upstream http://design-skills.apps.svc.cluster.local:8000;
        rewrite ^/design-skills-api/(.*)$ /$1 break;
        proxy_pass $designskills_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # Game Workshop API (AI-assisted game design, long timeout for LLM)
    location /game-workshop-api/ {
        set $gameworkshop_upstream http://game-design-workshop.apps.svc.cluster.local:8000;
        rewrite ^/game-workshop-api/(.*)$ /$1 break;
        proxy_pass $gameworkshop_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
    }

    # Knowledge Hub API (long timeout for AI analysis)
    location /knowledge-api/ {
        set $knowledge_upstream http://knowledge-hub.apps.svc.cluster.local:8000;
        rewrite ^/knowledge-api/(.*)$ /$1 break;
        proxy_pass $knowledge_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # Design Image API (game art prompt generation, SSE streaming)
    location /design-image-api/ {
        set $designimage_upstream http://design-image.apps.svc.cluster.local:8000;
        rewrite ^/design-image-api/(.*)$ /$1 break;
        proxy_pass $designimage_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
    }

    # ==================== Health Check ====================
    location /health {
        access_log off;
        return 200 '{"status":"healthy"}';
        add_header Content-Type application/json;
    }

    # ==================== SPA Fallback ====================
    location / {
        try_files $uri $uri/ /index.html;
    }
}
